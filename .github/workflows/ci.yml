name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Run Rust core tests
        run: cargo test -p pdf-arranger-core -- --nocapture

      - name: Run frontend logic tests
        run: bun test src/features/documents/lib/virtualGrid.test.ts src/features/documents/lib/rotationPreview.test.ts

      - name: Build frontend
        run: bun run build
